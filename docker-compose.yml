version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: agentflow-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - agentflow-network

  redis:
    image: redis:latest
    container_name: agentflow-redis
    ports:
      - "6379:6379"
    networks:
      - agentflow-network

networks:
  agentflow-network:
    driver: bridge

volumes:
  mongodb_data:
